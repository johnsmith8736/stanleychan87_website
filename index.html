<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stanleychan87 · 终端风格个人主页</title>
  <meta name="description" content="stanleychan87 的个人作品集网站 — 网络技术、开源项目与博客">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ═══ Main Container ═══ -->
  <div id="app">
    <!-- ─── Top Status Bar ─── -->
    <header id="top-bar">
      <div class="top-left">
        <span class="logo-icon">⧩</span>
        <span class="logo-text">stanleychan87 — 终端主页</span>
      </div>
      <div class="top-center">
        <span class="status-item" id="now-playing">
          <span class="status-dot green"></span>
          NOW PLAYING: <span class="playing-text">NOT PLAYING</span>
        </span>
        <span class="status-item" id="location-status">
          <span class="status-dot blue"></span>
          LOC: <span class="loc-text">UTC+08:00</span>
        </span>
      </div>
      <div class="top-right">
        <a href="https://github.com/johnsmith8736" target="_blank" rel="noopener" class="social-link" title="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <a href="https://twitter.com/stanleychan87" target="_blank" rel="noopener" class="social-link" title="X / Twitter">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="mailto:stanleychan87@users.noreply.github.com" class="social-link" title="Email">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </a>
      </div>
    </header>

    <!-- ─── Main Layout ─── -->
    <div id="main-layout">
      <!-- Left: File Explorer -->
      <aside id="explorer">
        <div class="explorer-header">
          <span class="explorer-title">📁 文件浏览器</span>
          <button id="close-explorer" title="关闭侧边栏">⊞ x</button>
        </div>
        <nav id="file-tree" role="tree" aria-label="文件浏览器">
          <!-- Dynamically rendered by JS -->
        </nav>
      </aside>

      <!-- Right: Content Preview -->
      <main id="content-panel">
        <div class="content-header">
          <span id="preview-tab">PREVIEW</span>
          <span id="current-file-path" class="file-path"></span>
        </div>
        <div id="preview-content">
          <!-- Content rendered here by JS -->
          <div id="empty-state">
            <div class="empty-icon">⊞</div>
            <p>在左侧文件浏览器中选择一个文件</p>
            <p class="empty-hint">↑↓ 导航 · ↵ 打开 · ←→ 折叠/展开</p>
          </div>
        </div>
      </main>
    </div>

    <!-- ─── Bottom Terminal ─── -->
    <footer id="terminal">
      <div class="terminal-header">
        <span class="terminal-tab">⚡ 终端</span>
        <div class="terminal-dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
      </div>
      <div id="terminal-body">
        <div id="terminal-output">
          <div class="terminal-line">
            <span class="prompt-user">stanleychan87</span>
            <span class="prompt-at">@</span>
            <span class="prompt-host">terminal</span>
            <span class="prompt-colon">:</span>
            <span class="prompt-path">~</span>
            <span class="prompt-dollar">$</span>
            <span class="prompt-welcome">欢迎使用终端主页！输入 <span class="cmd-hl">help</span> 查看可用命令</span>
          </div>
        </div>
        <div class="terminal-input-line">
          <span class="prompt-user">stanleychan87</span>
          <span class="prompt-at">@</span>
          <span class="prompt-host">terminal</span>
          <span class="prompt-colon">:</span>
          <span class="prompt-path">~</span>
          <span class="prompt-dollar">$</span>
          <input type="text" id="terminal-input" autofocus spellcheck="false" autocomplete="off" aria-label="终端输入">
          <span class="cursor-blink">▊</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
